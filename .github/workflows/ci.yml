name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q
      - name: Reproducible smoke experiment
        run: python -m lending_ai_lab.cli demo --n-samples 1200 --epochs 1 --output-dir artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: underwriting-smoke-report
          path: |
            artifacts/
            site/
