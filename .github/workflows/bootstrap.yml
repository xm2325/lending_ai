name: bootstrap-and-real-benchmark

on:
  push:
    branches: [main]
    paths:
      - project.tar.gz
      - .github/workflows/bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Expand complete project
        run: |
          set -euo pipefail
          tar -xzf project.tar.gz
          rm -f project.tar.gz .github/workflows/bootstrap.yml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,uci]'
      - name: Download official UCI dataset and record provenance
        run: |
          set -euo pipefail
          mkdir -p data/raw
          url='https://archive.ics.uci.edu/static/public/350/default%2Bof%2Bcredit%2Bcard%2Bclients.zip'
          curl --fail --location --retry 5 --retry-all-errors "$url" -o /tmp/uci_default.zip
          unzip -o /tmp/uci_default.zip -d /tmp/uci_default
          source_file="$(find /tmp/uci_default -maxdepth 2 -type f -iname '*.xls' | head -n 1)"
          test -n "$source_file"
          cp "$source_file" data/raw/default_of_credit_card_clients.xls
          sha256sum data/raw/default_of_credit_card_clients.xls > data/raw/SHA256SUMS
          fetched_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          checksum="$(cut -d' ' -f1 data/raw/SHA256SUMS)"
          cat > data/raw/SOURCE.md <<EOF
          # Data provenance

          - Dataset: Default of Credit Card Clients
          - Creator: I-Cheng Yeh
          - Repository: UCI Machine Learning Repository
          - Dataset ID: 350
          - DOI: https://doi.org/10.24432/C55S3H
          - Official download: ${url}
          - Licence: Creative Commons Attribution 4.0 International (CC BY 4.0)
          - Retrieved by GitHub Actions: ${fetched_at}
          - Stored file: data/raw/default_of_credit_card_clients.xls
          - SHA-256: ${checksum}

          The data describe 30,000 credit-card clients in Taiwan and six monthly records from April to September 2005. They are included for reproducibility under CC BY 4.0. They do not represent Capital One, the United Kingdom, current lending policy, or production performance.
          EOF
      - name: Validate and run real benchmark
        run: |
          ruff check src tests scripts
          pytest -q
          rm -rf artifacts_real
          python -m lending_ai_lab.cli uci --data-path data/raw/default_of_credit_card_clients.xls --output-dir artifacts_real
          python scripts/build_real_report.py --artifacts artifacts_real --output docs/real_results.md
      - name: Commit complete project, source data and results
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish lending AI workbench and real UCI benchmark [skip ci]'
          git push origin HEAD:main
